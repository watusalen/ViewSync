name: Gerar Instalador ViewSync (Apenas Windows)

on:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build para Windows
    runs-on: windows-latest

    steps:
      - name: 📥 Baixando o seu código
        uses: actions/checkout@v4

      - name: ⚙️ Configurando o Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 📦 Instalando as dependências
        # No Windows, usamos o install padrão
        run: npm install --no-package-lock

      - name: 🏗️ Compilando o Viewer (Site do Aluno)
        run: |
          cd apps/viewer-web
          npm run build

      - name: 🚚 Movendo a pasta 'out' para o Desktop
        # Comando específico do PowerShell para mover a pasta
        run: Move-Item -Path apps/viewer-web/out -Destination apps/desktop-transmissor/out -Force

      - name: 📦 Gerando o Instalador .EXE
        run: |
          cd apps/desktop-transmissor
          npm run build -- --win

      - name: 💾 Salvando o Instalador Final
        uses: actions/upload-artifact@v4
        with:
          name: ViewSync-Instalador-Windows
          path: apps/desktop-transmissor/release/*.exe