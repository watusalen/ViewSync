name: Build/Release ViewSync (Mac Only)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build para Mac
    runs-on: macos-latest

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: ⚙️ Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 Instalando Dependências
        run: npm install --no-package-lock

      - name: 🏗️ Compilando o Viewer (Site do Aluno)
        run: |
          cd apps/viewer-web
          npm run build

      - name: ⚙️ Recompilando Módulos Nativos (Mediasoup C++)
        run: npm run rebuild --workspace=view-sync-desktop

      - name: 🚀 Gerando Instaladores (Electron Builder)
        run: |
          cd apps/desktop-transmissor
          npm run build -- --mac
        shell: bash

      - name: 💾 Salvando Artefatos (Download)
        uses: actions/upload-artifact@v4
        with:
          name: ViewSync-Mac
          path: |
            apps/desktop-transmissor/release/*.dmg
            apps/desktop-transmissor/release/*.zip