name: Gerar Instalador ViewSync (Apenas Mac)

on:
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Instalar dependências raiz
        run: npm ci

      - name: Build Viewer
        working-directory: apps/viewer-web
        run: npm run build

      - name: Copiar viewer
        run: cp -R apps/viewer-web/out apps/desktop-transmissor/out

      - name: Build Mac
        working-directory: apps/desktop-transmissor
        run: npm run build -- --mac

      - uses: actions/upload-artifact@v6
        with:
          name: ViewSync-Mac
          path: apps/desktop-transmissor/release/*.dmg