name: Gerar Instalador ViewSync (Apenas Mac)

on:
  workflow_dispatch:

jobs:
  build-mac:
    name: Build para Mac
    runs-on: macos-latest

    steps:
      - name: 📥 Baixando o código
        uses: actions/checkout@v5

      - name: ⚙️ Configurando o Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: 🏗️ Instalando e compilando o Viewer
        working-directory: apps/viewer-web
        run: |
          npm ci
          npm run build

      - name: 🚚 Copiando o build do viewer
        run: |
          rm -rf apps/desktop-transmissor/out
          cp -R apps/viewer-web/out apps/desktop-transmissor/out

      - name: 📦 Instalando dependências do Desktop
        working-directory: apps/desktop-transmissor
        run: npm ci

      - name: 🍎 Gerando .DMG
        working-directory: apps/desktop-transmissor
        run: npm run build -- --mac

      - name: 💾 Salvando o arquivo final
        uses: actions/upload-artifact@v6
        with:
          name: ViewSync-Instalador-Mac
          path: apps/desktop-transmissor/release/*.dmg