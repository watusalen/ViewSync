name: Build/Release ViewSync

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build para ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: ⚙️ Configurando Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Instalando Dependências
        run: npm install

      - name: ⚙️ Recompilando Módulos Nativos (Mediasoup C++)
        run: npm run rebuild --workspace=view-sync-desktop

      - name: 🚀 Gerando Instaladores (Electron Builder)
        run: npm run build --workspace=view-sync-desktop

      - name: 💾 Salvando Artefatos (Download)
        uses: actions/upload-artifact@v4
        with:
          name: ViewSync-${{ matrix.os }}
          path: |
            apps/desktop-transmissor/release/*.exe
            apps/desktop-transmissor/release/*.dmg
            apps/desktop-transmissor/release/*.zip